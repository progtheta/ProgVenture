<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" type="text/css" href="styles.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.10.2/css/all.css" crossorigin="anonymous">
</head>

<body>
    <div class="container">
        <h2>Registration</h2>
        <form>
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" placeholder="Enter your username" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>

            <label for="preference">Preference:</label>
            <select id="preference" name="preference" required>
                <option value="">Select your preference</option>
                <option value="movie lover">Movie Lover</option>
                <option value="food lover">Food Lover</option>
                <option value="adventure lover">Adventure Lover</option>
                <option value="travel lover">Travel Lover</option>
            </select>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required>

            <button type="submit"><a href="modules.html"> Register</a></button>
        </form>
    </div>
</body>

</html>
